services:
  app:
    build: .
    ports:
      - "${VERIFY_HOST_PORT:-3000}:3000"
    environment:
      - PORT=3000
      - DATABASE_URL=postgres://verify:verify@db:5432/verifytest
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: verify
      POSTGRES_PASSWORD: verify
      POSTGRES_DB: verifytest
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U verify -d verifytest"]
      interval: 3s
      timeout: 2s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
