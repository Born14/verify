name: 'Verify by Born14'
description: 'Posts a PR change receipt showing what was checked, what was found, and what was not checked. Covers Kubernetes, Dockerfile, and GitHub Actions.'
author: 'Born14'

branding:
  icon: 'file-text'
  color: 'orange'

inputs:
  token:
    description: 'GitHub token with pull-requests: write and contents: read'
    required: false
    default: ${{ github.token }}
  scan-root:
    description: 'Directory to scan. Default is the repo root.'
    required: false
    default: '.'

outputs:
  result:
    description: 'CLEAR or N FINDINGS, mirroring the receipt'
  digest:
    description: 'SHA-256 packet digest of the receipt'

runs:
  using: 'node24'
  main: 'dist/action/index.cjs'
